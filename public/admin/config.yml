# Decap CMS configuration.
#
# This file describes which parts of the site the client can edit via the
# /admin GUI. The config.json file is the single source of truth for the
# site, and Decap is configured to edit specific keys inside it via the
# "file" collection type.
#
# Things the client should NOT be able to edit (business name, address,
# brand colours, SEO siteUrl, Cal.com username etc.) are intentionally not
# exposed here. Charlie updates those by editing config.json directly and
# pushing to GitHub.

backend:
  name: git-gateway
  branch: main

# Where uploaded images go. Decap puts them under public/images/ so they're
# served at /images/...
media_folder: "public/images"
public_folder: "/images"

publish_mode: simple

collections:

  # ---- Services ----
  - name: "services"
    label: "Services & Prices"
    description: "Edit the list of grooming services, prices and descriptions."
    files:
      - label: "Services list"
        name: "services_list"
        file: "src/config.json"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            summary: "{{fields.name}} — £{{fields.price}}"
            fields:
              - label: "ID (lowercase, hyphens only)"
                name: "id"
                widget: "string"
                hint: "Unique short ID used internally, e.g. full-groom. Lowercase letters and hyphens only — no spaces."
                pattern: ["^[a-z0-9-]+$", "Use lowercase letters, numbers and hyphens only — no spaces or symbols"]
              - label: "Service name"
                name: "name"
                widget: "string"
                hint: "Keep under 40 characters so it fits neatly on cards."
                pattern: ["^.{1,40}$", "Must be between 1 and 40 characters"]
              - label: "Duration (minutes)"
                name: "duration"
                widget: "number"
                value_type: "int"
                min: 5
                max: 480
                hint: "Enter the duration in minutes, e.g. 60 for one hour."
              - label: "Price (£)"
                name: "price"
                widget: "number"
                value_type: "int"
                min: 0
                max: 999
                hint: "Whole pounds only — no pence."
              - label: "Description"
                name: "description"
                widget: "text"
                hint: "Aim for 1–2 sentences (under 200 characters). Shown on service cards."
              - label: "Suitable for"
                name: "suitableFor"
                widget: "string"
                hint: "e.g. All breeds  /  Puppies under 6 months  /  Double-coated breeds"
                pattern: ["^.{1,80}$", "Keep under 80 characters"]
              - label: "Show on home page?"
                name: "featured"
                widget: "boolean"
                default: false
                hint: "Only the first 3 featured services appear on the home page."

  # ---- Opening hours ----
  - name: "hours"
    label: "Opening Hours"
    description: "Edit the opening hours shown on the site. Use the format 9:00am – 5:00pm or just the word Closed."
    files:
      - label: "Opening hours"
        name: "hours_settings"
        file: "src/config.json"
        fields:
          - label: "Business"
            name: "business"
            widget: "object"
            collapsed: false
            fields:
              - label: "Opening hours"
                name: "openingHours"
                widget: "object"
                collapsed: false
                fields:
                  - label: "Monday"
                    name: "monday"
                    widget: "string"
                    hint: "e.g. 9:00am – 5:00pm  or  Closed"
                    pattern: ["^(\\d{1,2}:\\d{2}(am|pm)\\s*[–-]\\s*\\d{1,2}:\\d{2}(am|pm)|Closed|closed)$", "Use format 9:00am – 5:00pm or the word Closed"]
                  - label: "Tuesday"
                    name: "tuesday"
                    widget: "string"
                    hint: "e.g. 9:00am – 5:00pm  or  Closed"
                    pattern: ["^(\\d{1,2}:\\d{2}(am|pm)\\s*[–-]\\s*\\d{1,2}:\\d{2}(am|pm)|Closed|closed)$", "Use format 9:00am – 5:00pm or the word Closed"]
                  - label: "Wednesday"
                    name: "wednesday"
                    widget: "string"
                    hint: "e.g. 9:00am – 5:00pm  or  Closed"
                    pattern: ["^(\\d{1,2}:\\d{2}(am|pm)\\s*[–-]\\s*\\d{1,2}:\\d{2}(am|pm)|Closed|closed)$", "Use format 9:00am – 5:00pm or the word Closed"]
                  - label: "Thursday"
                    name: "thursday"
                    widget: "string"
                    hint: "e.g. 9:00am – 5:00pm  or  Closed"
                    pattern: ["^(\\d{1,2}:\\d{2}(am|pm)\\s*[–-]\\s*\\d{1,2}:\\d{2}(am|pm)|Closed|closed)$", "Use format 9:00am – 5:00pm or the word Closed"]
                  - label: "Friday"
                    name: "friday"
                    widget: "string"
                    hint: "e.g. 9:00am – 5:00pm  or  Closed"
                    pattern: ["^(\\d{1,2}:\\d{2}(am|pm)\\s*[–-]\\s*\\d{1,2}:\\d{2}(am|pm)|Closed|closed)$", "Use format 9:00am – 5:00pm or the word Closed"]
                  - label: "Saturday"
                    name: "saturday"
                    widget: "string"
                    hint: "e.g. 9:00am – 1:00pm  or  Closed"
                    pattern: ["^(\\d{1,2}:\\d{2}(am|pm)\\s*[–-]\\s*\\d{1,2}:\\d{2}(am|pm)|Closed|closed)$", "Use format 9:00am – 5:00pm or the word Closed"]
                  - label: "Sunday"
                    name: "sunday"
                    widget: "string"
                    hint: "e.g. 10:00am – 2:00pm  or  Closed"
                    pattern: ["^(\\d{1,2}:\\d{2}(am|pm)\\s*[–-]\\s*\\d{1,2}:\\d{2}(am|pm)|Closed|closed)$", "Use format 9:00am – 5:00pm or the word Closed"]

  # ---- Photos ----
  - name: "photos"
    label: "Photos"
    description: "Upload and update the main photos used across the site."
    files:
      - label: "Site photos"
        name: "site_photos"
        file: "src/config.json"
        fields:
          - label: "Images"
            name: "images"
            widget: "object"
            collapsed: false
            fields:
              - label: "Home page hero image"
                name: "hero"
                widget: "image"
                hint: "Large banner photo shown at the top of the home page. Landscape, ideally 2400×1600px. Compress to under 250kb for best speed."
                required: false
              - label: "About page image"
                name: "about"
                widget: "image"
                hint: "Photo shown on the About page header and the home page About section. Landscape, ideally 2000×1200px."
                required: false
          - label: "Staff"
            name: "staff"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Update the owner/groomer photo and bio here."
            fields:
              - label: "Name"
                name: "name"
                widget: "string"
              - label: "Role"
                name: "role"
                widget: "string"
                hint: "e.g. Owner & Head Groomer"
              - label: "Photo"
                name: "photo"
                widget: "image"
                hint: "Square photo, ideally 800×800px. Shows on the About page."
                required: false
              - label: "Bio"
                name: "bio"
                widget: "text"
                hint: "2–3 sentences about the groomer's experience and specialisms."
              - label: "Qualifications"
                name: "qualifications"
                widget: "list"
                hint: "One qualification per line, e.g. City & Guilds Level 3 Dog Grooming"
                field:
                  label: "Qualification"
                  name: "qualification"
                  widget: "string"

  # ---- Reviews ----
  - name: "reviews"
    label: "Reviews"
    description: "Add or edit customer testimonials shown on the home page."
    files:
      - label: "Reviews list"
        name: "reviews_list"
        file: "src/config.json"
        fields:
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            summary: "{{fields.author}} — {{fields.rating}}★"
            fields:
              - label: "Customer name"
                name: "author"
                widget: "string"
                hint: "First name and last initial only, e.g. Emma T."
                pattern: ["^.{1,40}$", "Keep under 40 characters"]
              - label: "Pet name & breed (optional)"
                name: "pet"
                widget: "string"
                required: false
                hint: "e.g. Cockapoo, Biscuit — shown under the customer name."
                pattern: ["^.{0,60}$", "Keep under 60 characters"]
              - label: "Review text"
                name: "text"
                widget: "text"
                hint: "Aim for 2–4 sentences. Long reviews get truncated on mobile."
              - label: "Star rating"
                name: "rating"
                widget: "number"
                value_type: "int"
                min: 1
                max: 5
                default: 5
              - label: "Source"
                name: "source"
                widget: "select"
                options: ["Google", "Facebook", "Instagram", "Direct"]
                default: "Google"

  # ---- Gallery ----
  - name: "gallery"
    label: "Gallery"
    description: "Edit the before/after and general photos shown on the Gallery page."
    files:
      - label: "Gallery photos"
        name: "gallery_list"
        file: "src/config.json"
        fields:
          - label: "Photos"
            name: "gallery"
            widget: "list"
            summary: "{{fields.alt}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                hint: "Upload a JPEG. Square or landscape works best."
              - label: "Description (alt text)"
                name: "alt"
                widget: "string"
                hint: "Describe the photo for accessibility, e.g. Cockapoo after full groom"
                pattern: ["^.{1,120}$", "Keep under 120 characters"]
              - label: "Type"
                name: "type"
                widget: "select"
                options: ["before", "after", "general"]
                default: "after"
                hint: "Before/after pairs should share the same breed name below so the site can group them."
              - label: "Breed (optional)"
                name: "breed"
                widget: "string"
                required: false
                hint: "Used to pair before/after images, e.g. Cockapoo"
                pattern: ["^.{0,40}$", "Keep under 40 characters"]
